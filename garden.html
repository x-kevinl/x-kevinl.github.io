<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tree ASCII Growth Simulator</title>
  <style>
    body { font-family: monospace; background: #222; color: #eee; padding: 20px; }
    #ascii { white-space: pre; line-height: 1; font-size: 8px; }
    #controls { margin-bottom: 10px; }
    label, button { margin-right: 8px; }
    input { width: 50px; }
  </style>
</head>
<body>
  <h1>Tree ASCII Growth Simulator</h1>
  <div id="controls">
    <label>Steps: <input type="number" id="steps" value="8" min="2"></label>
    <label>Delay (ms): <input type="number" id="delay" value="500" min="50"></label>
    <label>Base Width (chars): <input type="number" id="baseWidth" value="80" min="10"></label>
    <button id="startBtn">Start Simulation</button>
  </div>
  <pre id="ascii">Loading...</pre>
  <canvas id="canvas" style="display:none;"></canvas>
  <img id="sourceImg" src="tree.webp" style="display:none;" crossorigin="anonymous">

  <script>
    const asciiChars = ['@','%','#','*','+','=','- ',':','.',' '];
    function mapPixel(v) {
      return asciiChars[Math.floor(v / 255 * (asciiChars.length - 1))];
    }
    function imageToASCII(img, newWidth) {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const [w, h] = [img.width, img.height];
      const aspect = h / w;
      const charAspect = 0.5;
      const newHeight = Math.floor(newWidth * aspect * charAspect);
      canvas.width = newWidth;
      canvas.height = newHeight;
      ctx.drawImage(img, 0, 0, newWidth, newHeight);
      const data = ctx.getImageData(0, 0, newWidth, newHeight).data;
      let ascii = '';
      for (let y = 0; y < newHeight; y++) {
        let line = '';
        for (let x = 0; x < newWidth; x++) {
          const i = (y * newWidth + x) * 4;
          const r = data[i], g = data[i+1], b = data[i+2];
          const v = (r + g + b) / 3;
          line += mapPixel(v);
        }
        ascii += line + '\n';
      }
      return ascii;
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      const img = document.getElementById('sourceImg');
      const steps = parseInt(document.getElementById('steps').value, 10);
      const delay = parseInt(document.getElementById('delay').value, 10);
      const baseWidth = parseInt(document.getElementById('baseWidth').value, 10);
      const asciiEl = document.getElementById('ascii');
      // build scale array: grow then shrink
      const scales = [];
      for (let i = 1; i <= steps; i++) scales.push(i / steps);
      for (let i = steps-1; i >= 1; i--) scales.push(i / steps);
      let idx = 0;
      clearInterval(window._sim);
      window._sim = setInterval(() => {
        const factor = scales[idx % scales.length];
        const w = Math.max(10, Math.floor(baseWidth * factor));
        asciiEl.textContent = imageToASCII(img, w);
        idx++;
      }, delay);
    });
  </script>
</body>
</html>
