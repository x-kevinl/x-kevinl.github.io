<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>deep space</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #canvas { display: block; }
    #terminal {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.8);
      color: #0f0;
      font-family: monospace;
      display: none;
      padding: 5px;
      box-sizing: border-box;
    }
    #terminal input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #0f0;
      font-family: monospace;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="terminal"><span>&gt; </span><input id="terminal-input" autocomplete="off" /></div>
<!-- Matter.js physics engine -->
<script src="https://unpkg.com/matter-js"></script>
<script>
  const { Engine, Render, Runner, Bodies, Composite, Constraint, Mouse, MouseConstraint, Events, Body } = Matter;

  const canvas = document.getElementById('canvas');
  const terminalEl = document.getElementById('terminal');

  const engine = Engine.create();
  const world = engine.world;

  const systemVariables = { friction: 0.1, gravity: 1 };
  engine.world.gravity.y = systemVariables.gravity;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    render.options.width = canvas.width;
    render.options.height = canvas.height;
    Render.lookAt(render, { x: canvas.width/2, y: canvas.height/2, width: canvas.width, height: canvas.height });
  }

  const render = Render.create({
    canvas: canvas,
    engine: engine,
    options: { wireframes: false, background: '#888' }
  });
  Render.run(render);
  Runner.run(Runner.create(), engine);

  window.addEventListener('resize', () => {
    resizeCanvas();
    Composite.remove(world, ground);
    ground = createGround();
    Composite.add(world, ground);
  });
  resizeCanvas();

  const groundHeight = 100;
  function createGround() {
    const termHeight = terminalEl.offsetHeight;
    const yPos = canvas.height - termHeight - groundHeight/2;
    return Bodies.rectangle(canvas.width/2, yPos, canvas.width, groundHeight, { isStatic: true });
  }

  let ground = createGround();
  Composite.add(world, ground);

  const mouse = Mouse.create(canvas);
  const mouseConstraint = MouseConstraint.create(engine, {
    mouse: mouse,
    constraint: { stiffness: 0.2, render: { visible: false } }
  });
  Composite.add(world, mouseConstraint);
  render.mouse = mouse;

  // Improved drag-to-velocity logic using time delta
  let isDragging = false;
  let draggedBody = null;
  let lastMousePos = null;
  let dragStartTime = null;

  Events.on(mouseConstraint, 'startdrag', event => {
    isDragging = true;
    draggedBody = event.body;
    lastMousePos = { x: mouse.position.x, y: mouse.position.y };
    dragStartTime = engine.timing.timestamp;
  });

  Events.on(mouseConstraint, 'mousemove', () => {
    if (isDragging) {
      lastMousePos = { x: mouse.position.x, y: mouse.position.y };
    }
  });

  Events.on(mouseConstraint, 'enddrag', () => {
    if (draggedBody) {
      const dx = mouse.position.x - lastMousePos.x;
      const dy = mouse.position.y - lastMousePos.y;
      const dragEndTime = engine.timing.timestamp;
      const dt = (dragEndTime - dragStartTime) / 1000; // seconds
      const vx = dt > 0 ? dx / dt : dx * 0.001;
      const vy = dt > 0 ? dy / dt : dy * 0.001;
      // Optional: cap max velocity
      const maxV = 50;
      const cap = v => Math.max(-maxV, Math.min(maxV, v));
      Body.setVelocity(draggedBody, { x: cap(vx), y: cap(vy) });
    }
    isDragging = false;
    draggedBody = null;
    dragStartTime = null;
  });

  const terminalInput = document.getElementById('terminal-input');

  document.addEventListener('keydown', e => {
    if (e.key === '/') {
      e.preventDefault(); terminalEl.style.display = 'block'; terminalInput.focus();
    } else if (e.key === 'Escape' && terminalEl.style.display === 'block') {
      hideTerminal();
    }
  });

  terminalInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { handleCommand(terminalInput.value.trim()); terminalInput.value = ''; }
    else if (e.key === 'Escape') hideTerminal();
  });

  function hideTerminal() {
    terminalEl.style.display = 'none'; terminalInput.value = ''; canvas.focus();
  }

  function handleCommand(input) {
    if (!input) return;
    const parts = input.split(/\s+/);
    let cmd = parts[0].replace(/^\//, '');
    const arg = parts[1] ? parts[1].replace(/[()]/g, '') : '';

    switch (cmd) {
      case 'spawn': spawn(arg); break;
      case 'set':
        if (parts[2] === 'to' && parts[1] in systemVariables) {
          const val = parseFloat(parts[3]);
          if (!isNaN(val)) {
            systemVariables[parts[1]] = val;
            if (parts[1] === 'gravity') engine.world.gravity.y = val;
          }
        }
        break;
      case 'reset':
        Composite.clear(world, false);
        ground = createGround(); Composite.add(world, ground);
        Composite.add(world, mouseConstraint);
        break;
      case 'exit': hideTerminal(); break;
      default: console.warn('Unknown command:', cmd);
    }
  }

  function spawn(item) {
    const x = mouse.position.x, y = mouse.position.y;
    if (item === 'square') Composite.add(world, Bodies.rectangle(x, y, 60, 60, { friction: systemVariables.friction }));
    else if (item === 'circle') Composite.add(world, Bodies.circle(x, y, 30, { friction: systemVariables.friction, restitution: 0.3 }));
    else if (item === 'rope') Composite.add(world, createRope(x, y));
    else console.warn('Cannot spawn:', item);
  }

  function createRope(x, y) {
    const rope = Composite.create();
    const segments = 10, length = 20;
    const group = Body.nextGroup(true);
    let prev = Bodies.circle(x, y, 5, { collisionFilter: { group }, isStatic: true });
    Composite.add(rope, prev);
    for (let i = 1; i <= segments; i++) {
      const body = Bodies.circle(x, y + i * length, 5, { collisionFilter: { group }, friction: systemVariables.friction, density: 0.001 });
      const constraint = Constraint.create({ bodyA: prev, bodyB: body, length, stiffness: 1 });
      Composite.add(rope, [body, constraint]); prev = body;
    }
    return rope;
  }
</script>
</body>
</html>
