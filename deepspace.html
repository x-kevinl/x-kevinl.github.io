<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DeepSpace Simulation</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #canvas { display: block; }
    #terminal {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.8);
      color: #0f0;
      font-family: monospace;
      display: none;
      padding: 5px;
      box-sizing: border-box;
    }
    #terminal input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #0f0;
      font-family: monospace;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="terminal"><span>&gt; </span><input id="terminal-input" autocomplete="off" /></div>
<script src="https://unpkg.com/matter-js"></script>
<script>
  const { Engine, Render, Runner, Bodies, Composite, Constraint, Mouse, MouseConstraint, Events, Body } = Matter;

  const canvas = document.getElementById('canvas');
  const terminalEl = document.getElementById('terminal');
  const terminalInput = document.getElementById('terminal-input');

  const engine = Engine.create();
  const world = engine.world;
  const systemVariables = { friction: 0.1, gravity: 1 };
  engine.world.gravity.y = systemVariables.gravity;

  const render = Render.create({
    canvas, engine,
    options: { wireframes: false, background: '#888', width: innerWidth, height: innerHeight }
  });
  Render.run(render);
  Runner.run(Runner.create(), engine);

  // ground above terminal
  function createGround() {
    const termHeight = terminalEl.offsetHeight;
    const y = innerHeight - termHeight - 50;
    return Bodies.rectangle(innerWidth/2, y, innerWidth, 100, { isStatic: true });
  }
  let ground = createGround();
  Composite.add(world, ground);

  // mouse control
  const mouse = Mouse.create(canvas);
  const mouseConstraint = MouseConstraint.create(engine, { mouse, constraint: { stiffness: 0.2, render: { visible: false } }});
  Composite.add(world, mouseConstraint);
  render.mouse = mouse;

  // drag to velocity
  let dragStart = null, dragBody = null;
  Events.on(mouseConstraint, 'startdrag', e => { dragBody = e.body; dragStart = { x: mouse.position.x, y: mouse.position.y, time: engine.timing.timestamp }; });
  Events.on(mouseConstraint, 'enddrag', () => {
    if (dragBody && dragStart) {
      const dt = (engine.timing.timestamp - dragStart.time)/1000;
      const dx = mouse.position.x - dragStart.x;
      const dy = mouse.position.y - dragStart.y;
      Body.setVelocity(dragBody, { x: dx/dt, y: dy/dt });
    }
    dragBody = null;
  });

  // draw radius
  Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    world.bodies.forEach(b => {
      if (b.circleRadius) {
        ctx.beginPath(); ctx.moveTo(b.position.x, b.position.y);
        ctx.lineTo(b.position.x + b.circleRadius, b.position.y);
        ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
      }
    });
  });

  // terminal toggle
  document.addEventListener('keydown', e => { if (e.key === '/') { e.preventDefault(); terminalEl.style.display = 'block'; terminalInput.focus(); } });
  function hide() { terminalEl.style.display = 'none'; terminalInput.value = ''; canvas.focus(); }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') hide(); });
  terminalInput.addEventListener('keydown', e => { if (e.key === 'Enter') { handleCommand(terminalInput.value); terminalInput.value = ''; } });

  function handleCommand(input) {
    const parts = input.split(' ');
    const cmd = parts[0];
    if (cmd === 'spawn' || cmd === '/spawn') {
      spawn(parts[1] ? parts[1].replace(/[()]/g, '') : '');
    } else if (cmd === 'set' && parts[2] === 'to') {
      const v = parseFloat(parts[3]);
      if (!isNaN(v) && parts[1] in systemVariables) {
        systemVariables[parts[1]] = v;
        if (parts[1] === 'gravity') engine.world.gravity.y = v;
      }
    } else if (cmd === 'reset') {
      Composite.clear(world, false);
      ground = createGround(); Composite.add(world, ground);
      Composite.add(world, mouseConstraint);
    } else if (cmd === 'exit') {
      hide();
    }
  }

  function spawn(item) {
    const x = mouse.position.x, y = mouse.position.y;
    if (item === 'square') Composite.add(world, Bodies.rectangle(x, y, 60, 60, { friction: systemVariables.friction }));
    else if (item === 'circle') Composite.add(world, Bodies.circle(x, y, 30, { friction: systemVariables.friction, restitution: 0.3 }));
    else if (item === 'rope') Composite.add(world, createRope(x, y));
  }

  function createRope(x, y) {
    const rope = Composite.create();
    let prev = Bodies.circle(x, y, 5, { isStatic: true }); Composite.add(rope, prev);
    for (let i = 1; i <= 10; i++) {
      const b = Bodies.circle(x, y + i*20, 5, { friction: systemVariables.friction });
      Composite.add(rope, b);
      Composite.add(rope, Constraint.create({ bodyA: prev, bodyB: b, length: 20, stiffness: 1 }));
      prev = b;
    }
    return rope;
  }
</script>
</body>
</html>
