<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DeepSpace Simulation</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #canvas { display: block; }
    #terminal {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.8);
      color: #0f0;
      font-family: monospace;
      display: none;
      padding: 5px;
      box-sizing: border-box;
    }
    #terminal input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #0f0;
      font-family: monospace;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="terminal"><span>&gt; </span><input id="terminal-input" autocomplete="off" /></div>
<!-- Matter.js physics engine -->
<script src="https://unpkg.com/matter-js"></script>
<script>
  const { Engine, Render, Runner, Bodies, Composite, Constraint, Mouse, MouseConstraint, Events, Body } = Matter;

  // Create engine and world
  const engine = Engine.create();
  const world = engine.world;

  // System variables
  const systemVariables = {
    friction: 0.1,
    gravity: 1
  };
  engine.world.gravity.y = systemVariables.gravity;

  // Setup canvas and renderer
  const canvas = document.getElementById('canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const render = Render.create({
    canvas: canvas,
    engine: engine,
    options: {
      wireframes: false,
      background: '#888',
      width: canvas.width,
      height: canvas.height
    }
  });
  Render.run(render);
  Runner.run(Runner.create(), engine);

  // Add ground to prevent falling through
  const ground = Bodies.rectangle(canvas.width / 2, canvas.height + 50, canvas.width, 100, { isStatic: true });
  Composite.add(world, ground);

  // Mouse control and dragging
  const mouse = Mouse.create(canvas);
  const mouseConstraint = MouseConstraint.create(engine, {
    mouse: mouse,
    constraint: { stiffness: 0.2, render: { visible: false } }
  });
  Composite.add(world, mouseConstraint);
  render.mouse = mouse;

  // Drag acceleration to velocity
  let isDragging = false;
  let draggedBody = null;
  let lastMousePos = null;

  Events.on(mouseConstraint, 'startdrag', event => {
    isDragging = true;
    draggedBody = event.body;
    lastMousePos = { x: mouse.position.x, y: mouse.position.y };
  });
  Events.on(mouseConstraint, 'mousemove', () => {
    if (isDragging) lastMousePos = { x: mouse.position.x, y: mouse.position.y };
  });
  Events.on(mouseConstraint, 'enddrag', () => {
    if (draggedBody) {
      const dx = mouse.position.x - lastMousePos.x;
      const dy = mouse.position.y - lastMousePos.y;
      Body.setVelocity(draggedBody, { x: dx * 10, y: dy * 10 });
    }
    isDragging = false;
    draggedBody = null;
  });

  // Terminal UI
  const terminal = document.getElementById('terminal');
  const terminalInput = document.getElementById('terminal-input');

  document.addEventListener('keydown', e => {
    if (e.key === '/') {
      e.preventDefault();
      terminal.style.display = 'block';
      terminalInput.focus();
    } else if (e.key === 'Escape' && terminal.style.display === 'block') {
      hideTerminal();
    }
  });

  terminalInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      handleCommand(terminalInput.value.trim());
      terminalInput.value = '';
    } else if (e.key === 'Escape') {
      hideTerminal();
    }
  });

  function hideTerminal() {
    terminal.style.display = 'none';
    terminalInput.value = '';
    canvas.focus();
  }

  function handleCommand(input) {
    if (!input) return;
    const parts = input.split(/\s+/);
    let cmd = parts[0];
    // support with or without slash
    if (cmd.startsWith('/')) cmd = cmd.slice(1);

    const arg = parts[1] ? parts[1].replace(/[()]/g, '') : '';

    switch (cmd) {
      case 'spawn':
        spawn(arg);
        break;
      case 'set':
        if (parts[2] === 'to' && parts[1] in systemVariables) {
          const val = parseFloat(parts[3]);
          if (!isNaN(val)) {
            systemVariables[parts[1]] = val;
            if (parts[1] === 'gravity') engine.world.gravity.y = val;
          }
        }
        break;
      case 'reset':
        Composite.clear(world, false);
        Composite.add(world, ground);
        Composite.add(world, mouseConstraint);
        break;
      case 'exit':
        hideTerminal();
        break;
      default:
        console.warn('Unknown command:', cmd);
    }
  }

  function spawn(item) {
    const x = mouse.position.x;
    const y = mouse.position.y;
    if (item === 'square') {
      Composite.add(world, Bodies.rectangle(x, y, 60, 60, { friction: systemVariables.friction }));
    } else if (item === 'circle') {
      Composite.add(world, Bodies.circle(x, y, 30, { friction: systemVariables.friction, restitution: 0.3 }));
    } else if (item === 'rope') {
      Composite.add(world, createRope(x, y));
    } else {
      console.warn('Cannot spawn:', item);
    }
  }

  function createRope(x, y) {
    const rope = Composite.create();
    const segments = 10;
    const length = 20;
    const group = Body.nextGroup(true);
    let prev = Bodies.circle(x, y, 5, { collisionFilter: { group }, isStatic: true });
    Composite.add(rope, prev);
    for (let i = 1; i <= segments; i++) {
      const body = Bodies.circle(x, y + i * length, 5, { collisionFilter: { group }, friction: systemVariables.friction, density: 0.001 });
      const constraint = Constraint.create({ bodyA: prev, bodyB: body, length, stiffness: 1 });
      Composite.add(rope, [body, constraint]);
      prev = body;
    }
    return rope;
  }
</script>
</body>
</html>
